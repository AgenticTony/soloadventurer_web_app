name: Task
description: Smallest unit of work deliverable within a sprint
title: "[Task]: "
labels: ["task"]
body:
  - type: markdown
    attributes:
      value: |
        This template is for development tasks that need to be completed within a sprint.

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why this task matters and links to sprint file row
      placeholder: |
        This task is part of Sprint XX - [Sprint Name]
        Link to sprint file: /docs/sprints/sprint-xx-name.md
        Referenced in sprint row: SXX-TXX
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Task Description
      description: What needs to be done?
      placeholder: Clear description of the work to be completed.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Bullet list of objective checks
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Criterion 3
    validations:
      required: true

  - type: dropdown
    id: sprint
    attributes:
      label: Sprint
      description: Which sprint is this task for?
      options:
        - sprint-01-foundations
        - sprint-02-trips-map
        - sprint-03-matching-connections
        - sprint-04-messages-feed
        - sprint-05-safety-scale
    validations:
      required: true

  - type: input
    id: estimate
    attributes:
      label: Estimate (points/hours)
      description: Time estimate for completing this task
      placeholder: 3 points, 4 hours, etc.

  - type: dropdown
    id: complexity
    attributes:
      label: Complexity
      description: How complex is this task?
      options:
        - Low (1-2 points)
        - Medium (3-5 points)
        - High (6-8 points)
        - Very High (8+ points)
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What type of work is this?
      options:
        - Frontend (React/Next.js)
        - Backend (GraphQL/Resolvers)
        - Database (Schema/Migrations)
        - Infrastructure (AWS/Deployment)
        - Testing (Unit/Integration/E2E)
        - Documentation
        - DevOps/CI/CD
        - Design/UI/UX
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: What other tasks or issues need to be completed first?
      placeholder: |
        - Depends on #123
        - Blocked by #456
        - Requires completion of database migration

  - type: textarea
    id: deliverables
    attributes:
      label: Deliverables
      description: What will be delivered when this task is complete?
      placeholder: |
        - Code changes in specific files
        - Updated documentation
        - Test coverage
        - Deployment artifacts

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Any additional information or context
      placeholder: Technical considerations, known risks, implementation notes, etc.